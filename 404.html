<!doctype html>
<html lang="pt-BR">
<head>

  <title>Página não encontrada | Euler Nascimento</title>

  <style>
    :root{--bg:#020611;--panel:rgba(5,14,34,.88);--text:#f3f7ff;--muted:#aebbd2;--blue:#087cff;--cyan:#00c8ff;--line:rgba(60,133,255,.24)}
    *{box-sizing:border-box}html,body{min-height:100%;margin:0}body{min-height:100vh;overflow-x:hidden;display:grid;place-items:center;padding:24px;color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 20% 15%,rgba(0,132,255,.18),transparent 32%),radial-gradient(circle at 85% 80%,rgba(0,70,255,.18),transparent 34%),linear-gradient(rgba(26,82,160,.08) 1px,transparent 1px),linear-gradient(90deg,rgba(26,82,160,.08) 1px,transparent 1px),var(--bg);background-size:auto,auto,64px 64px,64px 64px,auto}
    .shell{width:min(920px,100%);position:relative;border:1px solid var(--line);border-radius:30px;padding:clamp(34px,7vw,76px);text-align:center;background:linear-gradient(145deg,rgba(7,20,48,.94),rgba(2,7,19,.92));box-shadow:0 32px 90px rgba(0,0,0,.48);overflow:hidden}
    .shell::before,.shell::after{content:"";position:absolute;width:300px;height:300px;border:1px solid rgba(0,144,255,.22);border-radius:50%;pointer-events:none}.shell::before{top:-190px;right:-110px}.shell::after{bottom:-220px;left:-120px}
    .logo{width:78px;height:78px;object-fit:contain;filter:drop-shadow(0 0 20px rgba(0,130,255,.38))}.code{margin:24px 0 8px;font-size:clamp(84px,18vw,180px);line-height:.86;font-weight:900;letter-spacing:-.08em;color:transparent;background:linear-gradient(180deg,#fff 10%,#5ca9ff 58%,#075dff);-webkit-background-clip:text;background-clip:text;text-shadow:0 0 50px rgba(0,125,255,.16)}
    h1{margin:0;font-size:clamp(30px,6vw,58px);letter-spacing:-.04em}p{width:min(620px,100%);margin:18px auto 0;color:var(--muted);font-size:clamp(16px,2.3vw,20px);line-height:1.65}.actions{display:flex;justify-content:center;flex-wrap:wrap;gap:14px;margin-top:34px}.button{min-height:52px;display:inline-flex;align-items:center;justify-content:center;padding:0 24px;border:1px solid rgba(83,157,255,.42);border-radius:14px;color:#fff;font-weight:750;text-decoration:none;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}.button:hover{transform:translateY(-2px);border-color:rgba(64,181,255,.85);box-shadow:0 14px 34px rgba(0,105,255,.22)}.primary{border:0;background:linear-gradient(135deg,var(--cyan),var(--blue));box-shadow:0 12px 28px rgba(0,105,255,.27)}.secondary{background:rgba(5,18,44,.72)}.footer{margin-top:34px;color:#71809a;font-size:13px;letter-spacing:.12em;text-transform:uppercase}
    @media(max-width:560px){body{padding:14px}.shell{border-radius:22px;padding:38px 20px}.logo{width:64px;height:64px}.actions{display:grid}.button{width:100%}}
  </style>
</head>
<body>

      <a class="button secondary" href="https://wa.me/5535997490869?text=Olá%2C%20Euler!%20Encontrei%20uma%20página%20que%20não%20está%20disponível%20no%20seu%20portfólio." target="_blank" rel="noopener noreferrer">Falar no WhatsApp</a>
    </div>
    <div class="footer">Euler Nascimento · Sistemas Web</div>
  </main>
</body>
</html>
